# ==========================================================
# HYSTERIA 2 - УНИВЕРСАЛЬНАЯ КОНФИГУРАЦИЯ (2026)
# ==========================================================

# Порт для входящих UDP соединений
listen: :4433

# ----------------------------------------------------------
# 1. ВЫБОР СЕРТИФИКАТА (Разкомментируйте только ОДИН блок)
# ----------------------------------------------------------

# ВАРИАНТ А: Автоматический (Let's Encrypt на IP или Домен)
# Рекомендуется для Xray-core. Требует открытый порт 80.
acme:
  domains:
    - "ВАШ_IP_ИЛИ_ДОМЕН"
  email: "admin@example.com"

# ВАРИАНТ Б: Самоподписной (Требует ручной генерации файлов)
# Не рекомендуется для Xray-core без импорта в систему.
# tls:
#   cert: /etc/hysteria/certs/server.crt
#   key: /etc/hysteria/certs/server.key

# ----------------------------------------------------------
# 2. АУТЕНТИФИКАЦИЯ ПОЛЬЗОВАТЕЛЕЙ
# ----------------------------------------------------------
auth:
  type: userpass
  userpass:
    user1: "h2_auth_StrongPass_9921"
    # user2: "password_2"

# ----------------------------------------------------------
# 3. МАСКИРОВКА ТРАФИКА (Разкомментируйте нужный режим)
# ----------------------------------------------------------

# РЕЖИМ 1: Обфускация (Salamander)
# Превращает трафик в шум. Лучший выбор для обхода блокировок.
obfs:
  type: salamander
  salamander:
    password: "h2_obfs_SecretKey_5582"

# РЕЖИМ 2: Мимикрия (Proxy)
# Притворяется обычным HTTPS сайтом. Требует валидный TLS.
# masquerade:
#   type: proxy
#   proxy:
#     url: https://www.bing.com
#     rewriteHost: true

# ----------------------------------------------------------
# 4. ДОПОЛНИТЕЛЬНЫЕ НАСТРОЙКИ (Опционально)
# ----------------------------------------------------------

# Игнорировать ограничения скорости, заданные на стороне клиента.
# Если true, сервер всегда будет пытаться выдать максимум.
# ignoreClientBandwidth: false

# Тонкая настройка протокола QUIC (помогает при высоком пинге и потерях пакетов).
# quic:
#   # Окно потока (8 МБ). Позволяет достичь 300-400 Мбит/с при пинге ~200мс.
#   initStreamReceiveWindow: 8388608
#   maxStreamReceiveWindow: 8388608
#   # Окно соединения (20 МБ). Позволяет суммарно выжимать до 1 Гбит/с при высоком пинге.
#   initConnReceiveWindow: 20971520
#   maxConnReceiveWindow: 20971520
